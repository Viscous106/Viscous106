name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Viscous106
          outputs: |
            dist/github-snake.svg?color_snake=%238839ef&color_dots=%23eff1f5,%23ccd0da,%2394e2d5,%2374c7ec,%238839ef
            dist/github-snake-dark.svg?color_snake=%23cba6f7&color_dots=%231e1e2e,%23313244,%2389b4fa,%23f5c2e7,%23a6e3a1

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
