name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Viscous106
          outputs: |
            dist/github-snake.svg?color_snake=#8839ef&color_dots=#eff1f5,#ccd0da,#94e2d5,#74c7ec,#8839ef
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#cba6f7&color_dots=#313244,#45475a,#89b4fa,#f5c2e7,#a6e3a1

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
